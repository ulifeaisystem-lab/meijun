    el.type = el.type === 'password' ? 'text' : 'password';
}

function setStatus(msg, isError) {
    const bar = document.getElementById('statusBar');
    bar.style.display = 'block';
    bar.className = 'status-bar' + (isError ? ' error' : '');
    document.getElementById('statusText').textContent = msg;
    document.getElementById('progressBar').style.display = isError ? 'none' : 'block';
}
function setProgress(pct) { document.getElementById('progressFill').style.width = pct + '%'; }
function hideStatus() { document.getElementById('statusBar').style.display = 'none'; }
function setLoading(id, msg) { const el = document.getElementById(id); el.className = 'output-box loading'; el.textContent = msg; }

function typewriter(id, text, totalMs) {
    return new Promise(resolve => {
        const el = document.getElementById(id);
        el.className = 'output-box done';
        el.textContent = '';
        const cursor = document.createElement('span');
        cursor.cursor = 'cursor';
        cursor.className = 'cursor';
        el.appendChild(cursor);
        let i = 0;
        const speed = Math.min(10, Math.max(2, Math.floor(totalMs / text.length)));
        const timer = setInterval(() => {
            if (i < text.length) { el.insertBefore(document.createTextNode(text[i++]), cursor); }
            else { clearInterval(timer); cursor.remove(); resolve(); }
        }, speed);
    });
}

function generate(type) {
    document.querySelectorAll('.style-btn').forEach(b => { b.classList.remove('active'); b.classList.add('inactive'); b.disabled = true; });
    document.getElementById('btn-' + type).classList.add('active');
    document.getElementById('btn-' + type).classList.remove('inactive');

    setStatus('🌿 美君老師的文案生成中，請稍候...', false);
    setProgress(30);
    setLoading('out-fb', '生命觀點長文撰寫中...');
    setLoading('out-ig', '質感精簡版生成中...');
    setLoading('out-threads', '口語布施金句醞釀中...');

    setTimeout(async () => {
        setProgress(75);
        const variants = database[type];
        const randomIndex = Math.floor(Math.random() * variants.length);
        const json = variants[randomIndex];

        setProgress(90);
        hideStatus();
        
        await typewriter('out-fb', json.fb || '', 1200);
        await typewriter('out-ig', json.ig || '', 600);
        await typewriter('out-threads', json.threads || '', 400);
        
        document.querySelectorAll('.style-btn').forEach(b => { b.disabled = false; });
    }, 600);
}

function copyCol(id, btn) {
    const text = document.getElementById(id).innerText;
    if (!text || text.startsWith('點擊') || text.startsWith('生') || text.startsWith('質') || text.startsWith('口') || text.startsWith('❌')) return;
    navigator.clipboard.writeText(text).then(() => {
        const orig = btn.innerText;
        btn.innerText = '✓ 已複製';
        setTimeout(() => btn.innerText = orig, 2000);
    });
}
</script>
